name: Deploy

on:
  push:
    branches:
      - main
      - integration/companion-game
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

      - name: Checkout companion game
        uses: actions/checkout@v4
        with:
          ref: integration/companion-game
          path: companion-game

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: main/.nvmrc
          cache: npm
          cache-dependency-path: |
            main/package-lock.json
            companion-game/package-lock.json

      - name: Build main
        working-directory: main
        run: |
          npm ci
          npm run build

      - name: Build companion game
        working-directory: companion-game
        run: |
          npm ci
          npm run build

      - name: Assemble Pages site
        run: |
          mkdir -p site/companion-game
          cp -R main/dist/. site/
          cp -R companion-game/dist/. site/companion-game/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
